# Server configuration
server.port=8080

# PostgreSQL Database connection
spring.datasource.url=jdbc:postgresql://localhost:5432/nbo_database
spring.datasource.username=admin
spring.datasource.password=adminpassword
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA and Hibernate configuration
# Set to 'none' because database schema is managed by our Python ETL scripts
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# FastAPI Microservice URL
nbo.ai.service.url=http://localhost:8000