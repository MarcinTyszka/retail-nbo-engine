# Configures PostgreSQL database and pgAdmin UI for local development
version: '3.8'

services:
  postgres_db:
    image: postgres:15
    container_name: retail_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: nbo_database
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nbo_network

  pgadmin:
    image: dpage/pgadmin4
    container_name: retail_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: adminpassword
    ports:
      - "5050:80"
    depends_on:
      - postgres_db
    networks:
      - nbo_network

volumes:
  postgres_data:

networks:
  nbo_network:
    driver: bridge